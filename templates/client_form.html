{% extends "base.html" %}
{% block title %}{{ 'Modifier' if client else 'Nouveau' }} client | XKSGROUP CRM{% endblock %}

{% block content %}
<div class="page-head">
  <div>
    <h1 class="page-title">{{ 'Modifier client' if client else 'Nouveau client' }}</h1>
    <p class="page-sub">Centraliser toutes les informations du compte client.</p>
  </div>
</div>

<div class="surface-card form-shell">
  <form method="post" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Nom du client *</label>
      <input class="form-control" name="nom" value="{{ client.nom if client else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Entreprise</label>
      <input class="form-control" name="entreprise" value="{{ client.entreprise if client else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Email *</label>
      <input class="form-control" type="email" name="email" value="{{ client.email if client else '' }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Telephone</label>
      <input class="form-control" name="telephone" value="{{ client.telephone if client else '' }}">
    </div>
    <div class="col-12">
      <label class="form-label">Adresse</label>
      <textarea class="form-control" rows="4" name="adresse">{{ client.adresse if client else '' }}</textarea>
    </div>
    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary-modern" type="submit">Enregistrer le client</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('clients_list') }}">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
