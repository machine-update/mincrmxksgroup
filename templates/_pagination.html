{% if pagination and pagination.pages > 1 %}
<nav aria-label="Pagination" class="mt-4">
  <ul class="pagination justify-content-end mb-0">
    <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
      <a class="page-link" href="{{ pagination_url(endpoint, pagination.prev_num, pagination_args) if pagination.has_prev else '#' }}">Precedent</a>
    </li>
    {% for page_num in pagination.iter_pages(left_edge=1, left_current=1, right_current=2, right_edge=1) %}
      {% if page_num %}
      <li class="page-item {% if page_num == pagination.page %}active{% endif %}">
        <a class="page-link" href="{{ pagination_url(endpoint, page_num, pagination_args) }}">{{ page_num }}</a>
      </li>
      {% else %}
      <li class="page-item disabled"><span class="page-link">...</span></li>
      {% endif %}
    {% endfor %}
    <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
      <a class="page-link" href="{{ pagination_url(endpoint, pagination.next_num, pagination_args) if pagination.has_next else '#' }}">Suivant</a>
    </li>
  </ul>
</nav>
{% endif %}
